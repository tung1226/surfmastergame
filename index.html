<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SURF MASTER 浪金傳說 - 中角國小</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;touch-action:none;background:#0a1628;
  font-family:'Noto Sans TC',sans-serif;-webkit-user-select:none;user-select:none}
.screen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;z-index:1}
.screen.active{display:flex}
#startScreen{background:linear-gradient(180deg,#c0392b 0%,#e67e22 12%,#1a6fa8 38%,#0d3b6e 65%,#0a1628 100%);overflow:hidden}
.s-sun{position:absolute;top:7%;left:50%;transform:translateX(-50%);
  width:clamp(80px,14vw,110px);height:clamp(80px,14vw,110px);border-radius:50%;
  background:radial-gradient(circle,#fff9c4,#ffd700 40%,#ff6b35);
  box-shadow:0 0 60px 30px rgba(255,180,0,.5);animation:sunP 3s ease-in-out infinite}
@keyframes sunP{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.06)}}
.s-waves{position:absolute;bottom:0;left:0;right:0;height:220px;overflow:hidden}
.s-wave{position:absolute;bottom:0;width:200%;height:180px;border-radius:50% 50% 0 0/80px 80px 0 0}
.s-wave:nth-child(1){background:rgba(26,111,168,.9);animation:wM 4s linear infinite}
.s-wave:nth-child(2){background:rgba(13,59,110,.8);animation:wM 5s linear infinite reverse;bottom:-25px}
.s-wave:nth-child(3){background:rgba(10,22,40,.97);animation:wM 6s linear infinite;bottom:-50px}
@keyframes wM{0%{transform:translateX(-50%)}100%{transform:translateX(0%)}}
.s-badge{font-size:clamp(10px,2.5vw,13px);color:rgba(255,255,255,.9);letter-spacing:4px;margin-bottom:6px;z-index:2;position:relative;text-shadow:0 1px 4px rgba(0,0,0,.5)}
.s-title{font-size:clamp(36px,9vw,64px);font-weight:900;color:#ffd700;text-align:center;line-height:1.05;z-index:2;position:relative;
  text-shadow:0 0 24px rgba(255,215,0,.9),3px 3px 0 rgba(0,0,0,.5);animation:tG 2s ease-in-out infinite}
@keyframes tG{0%,100%{text-shadow:0 0 20px rgba(255,215,0,.8),3px 3px 0 rgba(0,0,0,.5)}50%{text-shadow:0 0 44px #ffd700,3px 3px 0 rgba(0,0,0,.5)}}
.s-sub{font-size:clamp(15px,3.5vw,22px);color:#7ecfff;font-weight:700;margin-bottom:clamp(8px,2vh,18px);z-index:2;position:relative;text-align:center}
.s-hero{font-size:clamp(56px,11vw,80px);z-index:2;position:relative;margin-bottom:clamp(6px,1.5vh,12px);animation:hF 2.5s ease-in-out infinite}
@keyframes hF{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-12px) rotate(3deg)}}
.s-info{color:rgba(255,255,255,.88);font-size:clamp(12px,2.8vw,15px);text-align:center;line-height:1.9;z-index:2;position:relative;margin-bottom:clamp(14px,2.5vh,22px);padding:0 24px}
.s-info b{color:#ffd700}
.s-ctrl{display:inline-block;margin-top:4px;font-size:.88em;color:rgba(255,255,255,.5);background:rgba(0,0,0,.25);border-radius:20px;padding:3px 14px}
.btn-start{background:linear-gradient(135deg,#ffd700,#ffaa00);color:#0a1628;border:none;
  padding:clamp(12px,2.5vh,18px) clamp(32px,6vw,52px);font-size:clamp(18px,4vw,22px);
  font-weight:900;font-family:inherit;border-radius:50px;cursor:pointer;z-index:2;position:relative;
  letter-spacing:2px;box-shadow:0 8px 28px rgba(255,215,0,.55);min-height:52px}
.btn-start:active{transform:scale(.93)}
.fc{position:absolute;pointer-events:none;animation:fcR linear infinite;opacity:.65;z-index:1}
@keyframes fcR{0%{transform:translateY(110vh);opacity:0}8%{opacity:.7}92%{opacity:.7}100%{transform:translateY(-10vh);opacity:0}}
#gameScreen{background:#0a1628}
#gameCanvas{position:absolute;inset:0;display:block;touch-action:none}
.hud{position:absolute;top:0;left:0;right:0;padding:clamp(10px,2vw,14px) clamp(10px,2.5vw,18px);
  display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:30;gap:6px}
.hud-box{background:rgba(8,18,35,.9);border:2px solid rgba(255,215,0,.5);border-radius:12px;
  padding:clamp(6px,1.5vw,10px) clamp(10px,2.2vw,16px);min-width:clamp(64px,13vw,96px);text-align:center}
.hud-label{font-size:clamp(9px,1.8vw,11px);color:#7ecfff;letter-spacing:2px;display:block}
.hud-val{font-size:clamp(20px,5vw,28px);font-weight:900;color:#ffd700;line-height:1.1;display:block}
.hud-unit{font-size:clamp(10px,2vw,12px);color:rgba(255,215,0,.65);display:block}
.hud-timer{color:white}
.hud-timer.danger{color:#ff4757;animation:dB .45s ease-in-out infinite}
@keyframes dB{0%,100%{opacity:1}50%{opacity:.4}}
#mobileControls{position:absolute;bottom:0;left:0;right:0;display:none;flex-direction:column;
  align-items:center;padding-bottom:clamp(16px,3.5vh,34px);gap:6px;z-index:40;pointer-events:none}
.ctrl-row{display:flex;gap:clamp(16px,4vw,28px);pointer-events:auto}
.ctrl-btn{width:clamp(72px,18vw,96px);height:clamp(72px,18vw,96px);border-radius:50%;
  background:rgba(13,59,110,.72);border:3px solid rgba(126,207,255,.55);
  display:flex;align-items:center;justify-content:center;font-size:clamp(26px,7vw,38px);
  cursor:pointer;touch-action:none;user-select:none;color:white;font-weight:bold}
.ctrl-btn.active{background:rgba(255,215,0,.35);border-color:#ffd700;transform:scale(.9)}
.ctrl-label{font-size:clamp(10px,2.2vw,12px);color:rgba(255,255,255,.45);letter-spacing:1.5px;pointer-events:none}
#kbHint{position:absolute;bottom:clamp(14px,2.5vh,20px);left:50%;transform:translateX(-50%);
  background:rgba(8,18,35,.9);border:1px solid rgba(126,207,255,.3);border-radius:20px;
  padding:7px 18px;font-size:clamp(11px,2vw,13px);color:#7ecfff;pointer-events:none;z-index:30;white-space:nowrap;display:none}
#endScreen{background:linear-gradient(180deg,#0a1628 0%,#0d3b6e 50%,#0a1628 100%);overflow:hidden}
.cw{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.cp{position:absolute;animation:cF linear infinite}
@keyframes cF{0%{transform:translateY(-30px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
.e-trophy{font-size:clamp(54px,11vw,76px);margin-bottom:6px;animation:tSp .9s cubic-bezier(.34,1.56,.64,1)}
@keyframes tSp{0%{transform:scale(0) rotate(-180deg)}100%{transform:scale(1) rotate(0)}}
.e-title{font-size:clamp(20px,5vw,36px);font-weight:900;color:#ffd700;text-align:center;padding:0 18px;margin-bottom:8px;text-shadow:0 0 20px rgba(255,215,0,.6)}
.e-sbox{background:rgba(255,215,0,.09);border:2px solid rgba(255,215,0,.5);border-radius:18px;padding:clamp(12px,3vh,20px) clamp(26px,6vw,46px);text-align:center;margin:10px 0}
.e-sl{font-size:13px;color:#7ecfff;letter-spacing:3px}
.e-sn{font-size:clamp(46px,10vw,66px);font-weight:900;color:#ffd700;line-height:1}
.e-ss{font-size:13px;color:rgba(255,215,0,.65)}
.e-rank{font-size:clamp(14px,3vw,19px);color:white;margin-bottom:16px;text-align:center;padding:0 18px}
.e-btns{display:flex;flex-direction:column;align-items:center;gap:10px}
.btn-retry{background:#1a6fa8;color:white;border:2px solid #7ecfff;padding:clamp(11px,2.2vh,15px) clamp(26px,6vw,44px);font-size:clamp(15px,3.5vw,19px);font-weight:700;font-family:inherit;border-radius:50px;cursor:pointer;min-height:50px}
.btn-retry:active{transform:scale(.93)}
.btn-home{background:transparent;color:#7ecfff;border:2px solid rgba(126,207,255,.35);padding:clamp(9px,2vh,12px) clamp(20px,4vw,34px);font-size:clamp(13px,3vw,15px);font-weight:700;font-family:inherit;border-radius:50px;cursor:pointer;min-height:46px}
.btn-home:active{background:rgba(126,207,255,.12)}
</style>
</head>
<body>
<div id="startScreen" class="screen active">
  <div id="fcWrap"></div>
  <div class="s-sun"></div>
  <div class="s-waves"><div class="s-wave"></div><div class="s-wave"></div><div class="s-wave"></div></div>
  <div class="s-badge">中角國小 × SURF MASTER</div>
  <div class="s-title">浪金傳說</div>
  <div class="s-sub">🌊 WAVE GOLD LEGEND 🌊</div>
  <div class="s-hero">🏄</div>
  <div class="s-info">操控 <b>中角浪金獵人</b> 在浪上衝刺<br>30秒內收集最多金幣贏得傳說！<br><span class="s-ctrl">📱 左右按鈕 ｜ 💻 方向鍵 / WASD</span></div>
  <button class="btn-start" onclick="startGame()">🏄 開始衝浪！</button>
</div>
<div id="gameScreen" class="screen">
  <canvas id="gameCanvas"></canvas>
  <div class="hud">
    <div class="hud-box"><span class="hud-label">💰 金幣</span><span class="hud-val" id="hScore">0</span><span class="hud-unit">枚</span></div>
    <div class="hud-box"><span class="hud-label">⏱ 剩餘</span><span class="hud-val hud-timer" id="hTimer">30</span></div>
    <div class="hud-box"><span class="hud-label">🔥 連擊</span><span class="hud-val" id="hCombo">0</span><span class="hud-unit">連</span></div>
  </div>
  <div id="mobileControls">
    <div class="ctrl-row">
      <div class="ctrl-btn" id="btnL">&#9664;</div>
      <div class="ctrl-btn" id="btnR">&#9654;</div>
    </div>
    <div class="ctrl-label">按住移動衝浪手</div>
  </div>
  <div id="kbHint">← → 方向鍵 / WASD · 衝浪去吃金幣！</div>
</div>
<div id="endScreen" class="screen">
  <div class="cw" id="confettiWrap"></div>
  <div class="e-trophy" id="eTrophy">🏆</div>
  <div class="e-title" id="eTitle"></div>
  <div class="e-sbox"><div class="e-sl">💰 收集金幣</div><div class="e-sn" id="eFinal">0</div><div class="e-ss">枚</div></div>
  <div class="e-rank" id="eRank"></div>
  <div class="e-btns">
    <button class="btn-retry" onclick="startGame()">🏄 再衝一次！</button>
    <button class="btn-home" onclick="goHome()">🏠 回主畫面</button>
  </div>
</div>
<script>
/* ============================================================
   CANVAS
============================================================ */
var cv  = document.getElementById('gameCanvas');
var ctx = cv.getContext('2d');
var W=0, H=0;
function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
resize();
window.addEventListener('resize',resize);

/* ============================================================
   INPUT
============================================================ */
var keys={left:false,right:false};
var mcDiv=document.getElementById('mobileControls');
var kbDiv=document.getElementById('kbHint');
var btnL=document.getElementById('btnL');
var btnR=document.getElementById('btnR');
function showMobile(){mcDiv.style.display='flex';kbDiv.style.display='none';}
function showDesktop(){mcDiv.style.display='none';kbDiv.style.display='block';}
if(navigator.maxTouchPoints>0||'ontouchstart' in window) showMobile(); else showDesktop();
window.addEventListener('touchstart',showMobile,{passive:true});
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){keys.left=true;e.preventDefault();showDesktop();}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){keys.right=true;e.preventDefault();showDesktop();}
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') keys.right=false;
});
function bindBtn(el,side){
  el.addEventListener('touchstart',function(e){e.preventDefault();keys[side]=true;el.classList.add('active');},{passive:false});
  el.addEventListener('touchend',function(e){e.preventDefault();keys[side]=false;el.classList.remove('active');},{passive:false});
  el.addEventListener('touchcancel',function(){keys[side]=false;el.classList.remove('active');});
  el.addEventListener('mousedown',function(e){e.preventDefault();keys[side]=true;el.classList.add('active');});
  el.addEventListener('mouseup',function(){keys[side]=false;el.classList.remove('active');});
  el.addEventListener('mouseleave',function(){keys[side]=false;el.classList.remove('active');});
}
bindBtn(btnL,'left'); bindBtn(btnR,'right');
var swX=null;
cv.addEventListener('touchstart',function(e){swX=e.touches[0].clientX;},{passive:true});
cv.addEventListener('touchmove',function(e){if(swX===null)return;var dx=e.touches[0].clientX-swX;if(Math.abs(dx)>10){keys.left=dx<0;keys.right=dx>0;}},{passive:true});
cv.addEventListener('touchend',function(){keys.left=keys.right=false;swX=null;});

/* ============================================================
   STATE
============================================================ */
var running=false,score=0,combo=0,comboT=0,timeLeft=30;
var gInt=null,frameId=null,lastTs=0,wT=0;
var coins=[],sparks=[],floats=[],trail=[];
var spawnT=0,spawnI=0.6;
var sx=0,sy=0,svx=0,stilt=0;
var SPEED=420,FRIC=0.80;

/* ============================================================
   WAVE
============================================================ */
function wY(x,t){
  return H*0.63+Math.sin(x*0.010+t*1.6)*16+Math.sin(x*0.019-t*2.4)*9+Math.sin(x*0.005+t*0.85)*22;
}

/* ============================================================
   SAFE FILL — always resets shadow before filling
   This is the KEY fix: shadowBlur must be 0 before any fill
============================================================ */
function sf(color){
  ctx.shadowBlur=0; ctx.shadowColor='transparent'; ctx.fillStyle=color;
}
function ss(color,w){
  ctx.shadowBlur=0; ctx.shadowColor='transparent'; ctx.strokeStyle=color; ctx.lineWidth=w;
}

/* ============================================================
   COIN SPAWN
============================================================ */
function spawnCoin(){
  var U=Math.min(W,H)/10;
  var T=[
    {type:0,value:1,r:U*0.44,spd:100+Math.random()*55},
    {type:1,value:3,r:U*0.50,spd:75+Math.random()*38},
    {type:2,value:5,r:U*0.46,spd:82+Math.random()*48}
  ];
  var rnd=Math.random(), t=rnd<0.6?T[0]:rnd<0.88?T[1]:T[2];
  coins.push({x:70+Math.random()*(W-140),y:-60,type:t.type,value:t.value,r:t.r,spd:t.spd,
    wob:Math.random()*Math.PI*2,wobS:1.6+Math.random()*2,alive:true});
}

/* ============================================================
   DRAW GOLD COIN — pure flat colours, zero gradients
============================================================ */
function drawGoldCoin(x,y,r){
  sf('#b8860b'); ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  sf('#ffd700'); ctx.beginPath(); ctx.arc(x,y,r*0.88,0,Math.PI*2); ctx.fill();
  sf('#ffe566'); ctx.beginPath(); ctx.arc(x,y,r*0.65,0,Math.PI*2); ctx.fill();
  sf('#fff4a0'); ctx.beginPath(); ctx.arc(x,y,r*0.42,0,Math.PI*2); ctx.fill();
  sf('rgba(255,255,240,0.85)'); ctx.beginPath(); ctx.arc(x-r*0.22,y-r*0.22,r*0.2,0,Math.PI*2); ctx.fill();
}

/* ============================================================
   DRAW BAG — pure flat colours
============================================================ */
function drawBag(x,y,r){
  // body outline
  sf('#b8860b'); ctx.beginPath(); ctx.arc(x,y+r*0.12,r*0.8,0,Math.PI*2); ctx.fill();
  // body fill
  sf('#ffd700'); ctx.beginPath(); ctx.arc(x,y+r*0.12,r*0.72,0,Math.PI*2); ctx.fill();
  sf('#ffe566'); ctx.beginPath(); ctx.arc(x,y+r*0.05,r*0.55,0,Math.PI*2); ctx.fill();
  // knot
  sf('#cc8800'); ctx.beginPath(); ctx.arc(x,y-r*0.5,r*0.28,0,Math.PI*2); ctx.fill();
  sf('#ffcc00'); ctx.beginPath(); ctx.arc(x,y-r*0.5,r*0.18,0,Math.PI*2); ctx.fill();
  // $ symbol — two rectangles (crossbar)
  sf('#7a4f00');
  var lw=Math.max(2,r*0.11), hs=r*0.32;
  ctx.fillRect(x-lw/2, y-r*0.08, lw, r*0.44);   // vertical bar
  ctx.fillRect(x-hs,   y+r*0.03, hs*2, lw);      // lower crossbar
  ctx.fillRect(x-hs*0.8, y-r*0.08+lw, hs*1.6, lw); // upper crossbar
  // shine
  sf('rgba(255,255,220,0.5)'); ctx.beginPath(); ctx.arc(x-r*0.25,y-r*0.1,r*0.2,0,Math.PI*2); ctx.fill();
}

/* ============================================================
   DRAW STAR — pure flat colours
============================================================ */
function drawStar(x,y,r,angle){
  var inner=r*0.42, pts=5;
  // outer star dark
  sf('#cc8800');
  ctx.beginPath();
  for(var i=0;i<pts*2;i++){
    var a=(i*Math.PI/pts)-Math.PI/2+angle;
    var rd=(i%2===0)?r*1.08:inner*0.9;
    var px2=x+Math.cos(a)*rd, py2=y+Math.sin(a)*rd;
    i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
  }
  ctx.closePath(); ctx.fill();
  // inner star bright
  sf('#ffd700');
  ctx.beginPath();
  for(var i=0;i<pts*2;i++){
    var a=(i*Math.PI/pts)-Math.PI/2+angle;
    var rd=(i%2===0)?r:inner;
    var px2=x+Math.cos(a)*rd, py2=y+Math.sin(a)*rd;
    i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
  }
  ctx.closePath(); ctx.fill();
  // highlight
  sf('#fff9a0');
  ctx.beginPath();
  for(var i=0;i<pts*2;i++){
    var a=(i*Math.PI/pts)-Math.PI/2+angle;
    var rd=(i%2===0)?r*0.6:inner*0.55;
    var px2=x+Math.cos(a)*rd, py2=y+Math.sin(a)*rd;
    i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
  }
  ctx.closePath(); ctx.fill();
  // stroke
  ss('#ffaa00',Math.max(1.5,r*0.07));
  ctx.beginPath();
  for(var i=0;i<pts*2;i++){
    var a=(i*Math.PI/pts)-Math.PI/2+angle;
    var rd=(i%2===0)?r:inner;
    var px2=x+Math.cos(a)*rd, py2=y+Math.sin(a)*rd;
    i===0?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
  }
  ctx.closePath(); ctx.stroke();
}

/* ============================================================
   DRAW SURFER — pure flat colours, all absolute coords
============================================================ */
function drawSurferFigure(x,y,tilt,velX){
  var U=Math.max(18,Math.min(W,H)*0.058);
  var dir=(velX>10)?-1:1;

  // board shadow
  sf('rgba(0,0,0,0.22)');
  ctx.beginPath(); ctx.ellipse(x+U*0.1,y+U*1.55,U*1.8,U*0.32,tilt,0,Math.PI*2); ctx.fill();

  // board — dark outline
  sf('#b8860b');
  ctx.beginPath(); ctx.ellipse(x,y+U*1.15,U*1.88,U*0.44,tilt-0.08,0,Math.PI*2); ctx.fill();
  // board — main gold
  sf('#ffd700');
  ctx.beginPath(); ctx.ellipse(x,y+U*1.15,U*1.75,U*0.36,tilt-0.08,0,Math.PI*2); ctx.fill();
  // board — white center
  sf('#ffffff');
  ctx.beginPath(); ctx.ellipse(x,y+U*1.15,U*1.1,U*0.24,tilt-0.08,0,Math.PI*2); ctx.fill();
  // board — red stripe
  sf('#ff4757');
  ctx.beginPath(); ctx.ellipse(x,y+U*1.15,U*0.45,U*0.28,tilt-0.08,0,Math.PI*2); ctx.fill();

  // back leg
  ss('#1a3a5c',U*0.30); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x+dir*U*0.2,y+U*0.05); ctx.lineTo(x+dir*U*0.52,y+U*0.62); ctx.lineTo(x+dir*U*0.34,y+U*1.08); ctx.stroke();
  // front leg
  ctx.beginPath(); ctx.moveTo(x-dir*U*0.15,y+U*0.05); ctx.lineTo(x-dir*U*0.48,y+U*0.58); ctx.lineTo(x-dir*U*0.30,y+U*1.08); ctx.stroke();

  // body dark navy
  sf('#1a3a5c');
  ctx.beginPath();
  ctx.moveTo(x-U*0.42,y-U*0.82);
  ctx.lineTo(x-U*0.52,y-U*0.4);
  ctx.lineTo(x-U*0.40,y+U*0.10);
  ctx.lineTo(x+U*0.40,y+U*0.10);
  ctx.lineTo(x+U*0.52,y-U*0.4);
  ctx.lineTo(x+U*0.42,y-U*0.82);
  ctx.closePath(); ctx.fill();

  // body stripe cyan
  sf('#29b6f6');
  ctx.beginPath();
  ctx.moveTo(x-U*0.12,y-U*0.82);
  ctx.lineTo(x-U*0.14,y-U*0.4);
  ctx.lineTo(x-U*0.11,y+U*0.10);
  ctx.lineTo(x+U*0.11,y+U*0.10);
  ctx.lineTo(x+U*0.14,y-U*0.4);
  ctx.lineTo(x+U*0.12,y-U*0.82);
  ctx.closePath(); ctx.fill();

  // arms — skin
  ss('#FDBCB4',U*0.26); ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x-dir*U*0.38,y-U*0.52); ctx.lineTo(x-dir*U*1.08,y-U*0.12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+dir*U*0.38,y-U*0.52); ctx.lineTo(x+dir*U*0.92,y-U*0.28); ctx.stroke();

  // neck
  sf('#FDBCB4'); ctx.beginPath(); ctx.arc(x,y-U*0.93,U*0.19,0,Math.PI*2); ctx.fill();
  // head
  sf('#FDBCB4'); ctx.beginPath(); ctx.arc(x,y-U*1.43,U*0.44,0,Math.PI*2); ctx.fill();
  // hair dark
  sf('#2c1810'); ctx.beginPath(); ctx.arc(x,y-U*1.56,U*0.44,Math.PI,Math.PI*2); ctx.fill();
  sf('#2c1810'); ctx.beginPath(); ctx.arc(x,y-U*1.43,U*0.50,Math.PI*1.07,Math.PI*1.93); ctx.fill();

  // sunglasses frame
  ss('#111111',Math.max(1.5,U*0.07));
  ctx.beginPath(); ctx.ellipse(x-U*0.17,y-U*1.44,U*0.20,U*0.13,0,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(x+U*0.17,y-U*1.44,U*0.20,U*0.13,0,0,Math.PI*2); ctx.stroke();
  // lens fill
  sf('rgba(0,100,255,0.45)');
  ctx.beginPath(); ctx.ellipse(x-U*0.17,y-U*1.44,U*0.20,U*0.13,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+U*0.17,y-U*1.44,U*0.20,U*0.13,0,0,Math.PI*2); ctx.fill();
  // bridge + temples
  ss('#111111',Math.max(1,U*0.06));
  ctx.beginPath(); ctx.moveTo(x-U*0.02,y-U*1.44); ctx.lineTo(x+U*0.02,y-U*1.44); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-U*0.35,y-U*1.44); ctx.lineTo(x-U*0.42,y-U*1.40); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+U*0.35,y-U*1.44); ctx.lineTo(x+U*0.42,y-U*1.40); ctx.stroke();

  // feet
  sf('#0d2a42');
  ctx.beginPath(); ctx.ellipse(x-dir*U*0.29,y+U*1.08,U*0.36,U*0.19,0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+dir*U*0.20,y+U*1.08,U*0.30,U*0.18,-0.2,0,Math.PI*2); ctx.fill();
}

/* ============================================================
   DRAW OCEAN — reset shadow before every fill/stroke
============================================================ */
function drawOcean(t){
  // sky — solid colour bands (no gradient needed for iOS compat)
  sf('#08101e'); ctx.fillRect(0,0,W,H*0.20);
  sf('#0d2a50'); ctx.fillRect(0,H*0.18,W,H*0.15);
  sf('#0d3b6e'); ctx.fillRect(0,H*0.30,W,H*0.15);
  sf('#1a6fa8'); ctx.fillRect(0,H*0.42,W,H*0.25);

  // sun
  sf('#fff4a0'); ctx.beginPath(); ctx.arc(W*0.74,H*0.13,38,0,Math.PI*2); ctx.fill();
  sf('#ffd700'); ctx.beginPath(); ctx.arc(W*0.74,H*0.13,30,0,Math.PI*2); ctx.fill();
  sf('#fff9c4'); ctx.beginPath(); ctx.arc(W*0.74,H*0.13,18,0,Math.PI*2); ctx.fill();

  // stars
  var ss2=[.09,.17,.27,.05,.38,.47,.6,.71,.85,.93,.13,.55,.79];
  var sv2=[.03,.09,.05,.14,.02,.08,.04,.11,.03,.07,.16,.06,.12];
  for(var i=0;i<ss2.length;i++){
    ctx.globalAlpha=(.3+.7*Math.abs(Math.sin(t+i*1.3)))*.75;
    sf('white'); ctx.beginPath(); ctx.arc(ss2[i]*W,sv2[i]*H*0.72,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;

  // sea body — solid colour fill
  sf('#1a6fa8');
  ctx.beginPath(); ctx.moveTo(0,H);
  for(var x=0;x<=W;x+=8) ctx.lineTo(x,wY(x,t));
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // darker deep water overlay
  sf('#0d3b6e');
  ctx.beginPath(); ctx.moveTo(0,H);
  for(var x=0;x<=W;x+=8){ var wy2=wY(x,t)+H*0.18; ctx.lineTo(x,Math.min(wy2,H)); }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  // wave crest — NO shadow
  ctx.shadowBlur=0; ctx.shadowColor='transparent';
  ctx.strokeStyle='rgba(126,207,255,0.7)'; ctx.lineWidth=3;
  ctx.beginPath();
  for(var x=0;x<=W;x+=6){ var y2=wY(x,t); x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2); }
  ctx.stroke();

  // 2nd wave
  ctx.globalAlpha=0.35; ctx.strokeStyle='#7ecfff'; ctx.lineWidth=2;
  ctx.beginPath();
  for(var x=0;x<=W;x+=6){ var y2=wY(x,t)+18+Math.sin(x*0.016+t*2.2)*7; x===0?ctx.moveTo(x,y2):ctx.lineTo(x,y2); }
  ctx.stroke();
  ctx.globalAlpha=1;
}

/* ============================================================
   DRAW SURFER wrapper
============================================================ */
function drawSurfer(t){
  var wy=wY(sx,t); sy=wy-28;
  var bob=Math.sin(t*2.6)*4;
  var px=sx, py=sy+bob;
  trail.push({x:px,y:py+20});
  if(trail.length>14) trail.shift();
  for(var i=0;i<trail.length;i++){
    ctx.globalAlpha=(i/trail.length)*0.30;
    sf('#7ecfff'); ctx.beginPath(); ctx.ellipse(trail[i].x,trail[i].y,(i+1)*1.3,3,0,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  if(Math.abs(svx)>25&&Math.random()>0.55){
    sparks.push({x:px-Math.sign(svx)*16,y:py+22,vx:-svx*0.3+(Math.random()-0.5)*30,vy:-30-Math.random()*40,life:1,decay:3,r:2+Math.random()*3,spray:true});
  }
  stilt+=((svx/SPEED)*0.28-stilt)*0.14;
  drawSurferFigure(px,py,stilt,svx);
}

/* ============================================================
   DRAW COINS
============================================================ */
function drawCoins(){
  for(var i=0;i<coins.length;i++){
    var c=coins[i]; if(!c.alive) continue;
    c.wob+=c.wobS*(1/60);
    var cx=c.x+Math.sin(c.wob)*10;
    // glow ring (NO shadowBlur — use manual halo circle)
    ctx.globalAlpha=0.35;
    sf('#ffd700'); ctx.beginPath(); ctx.arc(cx,c.y,c.r*1.45,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // draw shape
    if(c.type===0) drawGoldCoin(cx,c.y,c.r);
    else if(c.type===1) drawBag(cx,c.y,c.r);
    else drawStar(cx,c.y,c.r,c.wob*0.6);
    // badge
    if(c.value>1){
      var bR=Math.max(10,c.r*0.5);
      var bX=cx+c.r*0.9, bY=c.y-c.r*0.9;
      sf('rgba(0,0,0,0.88)'); ctx.beginPath(); ctx.arc(bX,bY,bR,0,Math.PI*2); ctx.fill();
      sf('#ffd700'); ctx.font='bold '+Math.round(bR*1.3)+'px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('+'+c.value,bX,bY);
    }
  }
}

/* ============================================================
   SPARKS + FLOATS
============================================================ */
function burst(x,y){
  for(var i=0;i<10;i++){
    var a=Math.random()*Math.PI*2,sp=80+Math.random()*160;
    sparks.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-50,life:1,decay:1.8+Math.random(),r:3+Math.random()*6,spray:false});
  }
}
function showFloat(x,y,text,color){
  floats.push({x:x,y:y,text:text,color:color,life:1,vy:-80,size:Math.max(22,Math.min(W,H)*0.055)});
}
function drawSparks(dt){
  for(var i=sparks.length-1;i>=0;i--){
    var p=sparks[i];
    p.life-=p.decay*dt; if(p.life<=0){sparks.splice(i,1);continue;}
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=120*dt;
    ctx.globalAlpha=Math.max(0,p.life);
    sf(p.spray?'#7ecfff':'#ffd700');
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(0.5,p.r*p.life),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawFloats(dt){
  for(var i=floats.length-1;i>=0;i--){
    var f=floats[i];
    f.life-=1.6*dt; if(f.life<=0){floats.splice(i,1);continue;}
    f.y+=f.vy*dt;
    ctx.globalAlpha=Math.max(0,f.life);
    ctx.shadowBlur=0; ctx.shadowColor='transparent';
    ctx.font='900 '+f.size+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle=f.color;
    ctx.fillText(f.text,f.x,f.y);
  }
  ctx.globalAlpha=1;
}

/* ============================================================
   COLLISION
============================================================ */
function checkHits(){
  var py=wY(sx,wT)-28;
  for(var i=0;i<coins.length;i++){
    var c=coins[i]; if(!c.alive) continue;
    var cx=c.x+Math.sin(c.wob)*10;
    if(Math.hypot(cx-sx,c.y-py)<c.r*1.15){
      c.alive=false; combo++; comboT=2.5;
      var earned=c.value*(combo>1?combo:1); score+=earned;
      playCoin(c.value);
      burst(cx,c.y);
      showFloat(cx,c.y-20,combo>1?'+'+earned+' x'+combo+'連！':'+'+earned,combo>3?'#ff6b35':'#ffd700');
      document.getElementById('hScore').textContent=score;
      document.getElementById('hCombo').textContent=combo;
    }
  }
  coins=coins.filter(function(c){return c.alive&&c.y<H+80;});
}

/* ============================================================
   GAME LOOP
============================================================ */
function loop(ts){
  if(!running) return;
  var dt=Math.min((ts-lastTs)/1000,0.05);
  lastTs=ts; wT+=dt;
  var acc=SPEED*dt*2.5;
  if(keys.left) svx-=acc;
  if(keys.right) svx+=acc;
  svx*=Math.pow(FRIC,dt*60);
  sx+=svx*dt; sx=Math.max(40,Math.min(W-40,sx));
  if(comboT>0){comboT-=dt;if(comboT<=0){combo=0;document.getElementById('hCombo').textContent=0;}}
  spawnT-=dt;
  if(spawnT<=0){
    spawnCoin();
    spawnI=Math.max(0.22,0.62-(30-timeLeft)*0.009);
    spawnT=spawnI*(0.65+Math.random()*0.7);
  }
  for(var i=0;i<coins.length;i++) coins[i].y+=coins[i].spd*dt;
  checkHits();
  // ── RENDER ──
  // Always reset shadow state at start of frame
  ctx.shadowBlur=0; ctx.shadowColor='transparent'; ctx.globalAlpha=1;
  ctx.clearRect(0,0,W,H);
  drawOcean(wT);
  ctx.shadowBlur=0; ctx.shadowColor='transparent'; // reset after ocean
  drawCoins();
  ctx.shadowBlur=0; ctx.shadowColor='transparent'; // reset after coins
  drawSurfer(wT);
  ctx.shadowBlur=0; ctx.shadowColor='transparent'; // reset after surfer
  drawSparks(dt);
  drawFloats(dt);
  ctx.shadowBlur=0; ctx.shadowColor='transparent';
  ctx.globalAlpha=1;
  if(timeLeft<=5){
    ctx.fillStyle='rgba(255,71,87,'+(0.07+0.06*Math.sin(wT*9))+')';
    ctx.fillRect(0,0,W,H);
  }
  frameId=requestAnimationFrame(loop);
}

/* ============================================================
   AUDIO — Web Audio API (zero external files)
============================================================ */
var AC=null;
function getAC(){
  if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}



function playCoin(value){
  var ac=getAC();
  var base=value===1?880:value===3?1046:1318;
  function ding(freq,vol,delay,dur){
    var o=ac.createOscillator(); o.type='sine'; o.frequency.value=freq;
    var g=ac.createGain();
    g.gain.setValueAtTime(0,ac.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol,ac.currentTime+delay+0.012);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+dur);
    o.connect(g); g.connect(ac.destination);
    o.start(ac.currentTime+delay); o.stop(ac.currentTime+delay+dur);
  }
  ding(base,    0.42, 0,    0.18);
  ding(base*2,  0.16, 0,    0.12);
  if(value>=3) ding(base*1.5, 0.20, 0.07, 0.22);
  if(value>=5) ding(base*2.5, 0.14, 0.13, 0.18);
}

function playFanfare(){
  var ac=getAC();
  var seq=[523,659,784,1047]; var step=0.13;
  seq.forEach(function(f,i){
    var t=ac.currentTime+i*step;
    var o=ac.createOscillator(); o.type='triangle'; o.frequency.value=f;
    var g=ac.createGain();
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.28,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+step*1.8);
    o.connect(g); g.connect(ac.destination); o.start(t); o.stop(t+step*2);
  });
}

/* ============================================================
   START / END / HOME
============================================================ */
function startGame(){
  showScreen('gameScreen');
  if(navigator.maxTouchPoints>0||'ontouchstart' in window) showMobile(); else showDesktop();
  score=0;combo=0;comboT=0;timeLeft=30;
  coins=[];sparks=[];floats=[];trail=[];
  spawnT=0.3;spawnI=0.62;wT=0;svx=0;stilt=0;running=true;sx=W/2;sy=H*0.63;
  document.getElementById('hScore').textContent=0;
  document.getElementById('hCombo').textContent=0;
  var ht=document.getElementById('hTimer'); ht.textContent=30; ht.classList.remove('danger');
  if(gInt) clearInterval(gInt);
  gInt=setInterval(function(){
    timeLeft--;
    var el=document.getElementById('hTimer'); el.textContent=timeLeft;
    if(timeLeft<=5) el.classList.add('danger');
    if(timeLeft<=0){clearInterval(gInt);endGame();}
  },1000);
  if(frameId) cancelAnimationFrame(frameId);
  lastTs=performance.now();
  frameId=requestAnimationFrame(loop);
}
function endGame(){
  running=false; if(frameId) cancelAnimationFrame(frameId);
  playFanfare();
  document.getElementById('eFinal').textContent=score;
  var t,ti,r;
  if(score>=60){t='🏆';ti='浪金傳說！LEGENDARY!';r='🌟🌟🌟 中角浪金王 🌟🌟🌟';}
  else if(score>=40){t='🥇';ti='金浪高手達成！';r='⭐⭐ 浪金獵人精英 ⭐⭐';}
  else if(score>=25){t='🥈';ti='衝浪高手！';r='⭐ 浪金獵人見習 ⭐';}
  else if(score>=10){t='🥉';ti='繼續加油！';r='🌊 衝浪新手成長中 🌊';}
  else{t='🏄';ti='再衝一次！';r='💪 浪金獵人訓練中 💪';}
  document.getElementById('eTrophy').textContent=t;
  document.getElementById('eTitle').textContent=ti;
  document.getElementById('eRank').textContent=r;
  makeConfetti(); showScreen('endScreen');
}
function goHome(){
  if(running){running=false;cancelAnimationFrame(frameId);clearInterval(gInt);}
  showScreen('startScreen');
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById(id).classList.add('active');
}
function makeConfetti(){
  var w=document.getElementById('confettiWrap'); w.innerHTML='';
  var cols=['#ffd700','#ff6b35','#7ecfff','#ff4757','#2ed573','#fff'];
  for(var i=0;i<50;i++){
    var el=document.createElement('div'); el.className='cp';
    var s=6+Math.random()*9;
    el.style.cssText='left:'+Math.random()*100+'%;background:'+cols[i%cols.length]+';width:'+s+'px;height:'+s+'px;border-radius:'+(Math.random()>0.5?'50%':'3px')+';animation-duration:'+(1.8+Math.random()*3)+'s;animation-delay:'+Math.random()*2+'s;';
    w.appendChild(el);
  }
}
(function(){
  var w=document.getElementById('fcWrap');
  var em=['🪙','💰','⭐','✨'];
  for(var i=0;i<14;i++){
    var el=document.createElement('div'); el.className='fc';
    el.textContent=em[i%em.length];
    el.style.cssText='left:'+Math.random()*94+'%;font-size:'+(16+Math.random()*20)+'px;animation-duration:'+(5+Math.random()*8)+'s;animation-delay:'+Math.random()*7+'s;';
    w.appendChild(el);
  }
})();
</script>
